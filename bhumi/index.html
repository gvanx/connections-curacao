<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 22nd Birthday, Bhumi!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --gold: #d4a853;
    --gold-light: #f0d48a;
    --cream: #faf6ee;
    --dark: #1a1410;
    --wine: #6b2d3e;
    --blush: #e8c4b8;
    --sage: #8a9a7b;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--dark);
    color: var(--cream);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* === STARFIELD === */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--gold-light);
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: var(--max-opacity); transform: scale(1.2); }
  }

  /* === FLOATING PARTICLES === */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: floatUp var(--dur) ease-in infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    10% { opacity: 0.8; }
    90% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-100vh) rotate(720deg); }
  }

  /* === MAIN LAYOUT === */
  .scene {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }

  /* === AGE BADGE === */
  .age-ring {
    position: relative;
    width: 160px;
    height: 160px;
    margin-bottom: 2rem;
    animation: enterScale 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }

  .age-ring svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    animation: spinSlow 20s linear infinite;
  }

  @keyframes spinSlow {
    to { transform: rotate(360deg); }
  }

  .age-ring .number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 4.5rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(212,168,83,0.4);
  }

  /* === GREETING TEXT === */
  .greeting {
    animation: enterUp 0.8s ease-out 0.6s both;
  }

  .greeting .label {
    font-size: 0.9rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--blush);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .greeting h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 900;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 0.2rem;
  }

  .greeting h1 .name {
    display: block;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* === DIVIDER === */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.8rem 0;
    animation: enterUp 0.8s ease-out 0.9s both;
  }

  .divider::before, .divider::after {
    content: '';
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .divider .diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* === MESSAGE === */
  .message {
    max-width: 520px;
    animation: enterUp 0.8s ease-out 1.1s both;
  }

  .message p {
    font-size: 1.15rem;
    line-height: 1.7;
    color: var(--blush);
    font-weight: 300;
  }

  .message p strong {
    color: var(--gold-light);
    font-weight: 500;
  }

  /* === WISH BUTTON === */
  .wish-btn {
    margin-top: 2.5rem;
    padding: 1rem 2.8rem;
    border: 1.5px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    animation: enterUp 0.8s ease-out 1.4s both;
  }

  .wish-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
    z-index: -1;
  }

  .wish-btn:hover {
    color: var(--dark);
  }

  .wish-btn:hover::before {
    transform: scaleX(1);
  }

  /* === CONFETTI CANVAS === */
  #confetti {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
  }

  /* === CAKE === */
  .cake-wrap {
    margin-top: 2rem;
    animation: enterUp 0.8s ease-out 1.6s both;
    position: relative;
  }

  .cake {
    font-size: 4rem;
    position: relative;
    display: inline-block;
    filter: drop-shadow(0 0 20px rgba(212,168,83,0.3));
    animation: cakeBounce 2s ease-in-out infinite;
  }

  @keyframes cakeBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .candle-glow {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 30px;
    background: radial-gradient(circle, rgba(255,200,50,0.6), transparent 70%);
    border-radius: 50%;
    animation: flicker 0.15s ease-in-out infinite alternate;
  }

  @keyframes flicker {
    0% { opacity: 0.7; transform: translateX(-50%) scale(0.95); }
    100% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }

  /* === FOOTER === */
  .footer-note {
    position: absolute;
    bottom: 1.5rem;
    font-size: 0.75rem;
    color: rgba(250,246,238,0.25);
    letter-spacing: 0.15em;
  }

  /* === ANIMATIONS === */
  @keyframes enterUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes enterScale {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  /* === MUSIC TOGGLE === */
  .music-toggle {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 50;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: rgba(26,20,16,0.8);
    backdrop-filter: blur(10px);
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .music-toggle:hover {
    background: var(--gold);
    color: var(--dark);
  }

  .bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 16px;
  }

  .bars span {
    display: block;
    width: 3px;
    background: currentColor;
    border-radius: 1px;
    animation: none;
  }

  .bars.playing span {
    animation: barBounce 0.6s ease-in-out infinite alternate;
  }

  .bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .bars span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
  .bars span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
  .bars span:nth-child(4) { height: 14px; animation-delay: 0.1s; }

  @keyframes barBounce {
    0% { height: 4px; }
    100% { height: 16px; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 480px) {
    .age-ring { width: 130px; height: 130px; }
    .age-ring .number { font-size: 3.5rem; }
    .message p { font-size: 1rem; }
    .divider::before, .divider::after { width: 40px; }
  }
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<!-- Floating particles -->
<div id="particles"></div>

<!-- Confetti canvas -->
<canvas id="confetti"></canvas>

<!-- Main content -->
<div class="scene">
  <div class="age-ring">
    <svg viewBox="0 0 160 160">
      <circle cx="80" cy="80" r="72" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="4 8" opacity="0.6"/>
      <circle cx="80" cy="80" r="62" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.3"/>
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#d4a853"/>
          <stop offset="50%" stop-color="#f0d48a"/>
          <stop offset="100%" stop-color="#d4a853"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="number">22</span>
  </div>

  <div class="greeting">
    <p class="label">Happy Birthday</p>
    <h1>
      <span class="name">Bhumi</span>
    </h1>
  </div>

  <div class="divider">
    <span class="diamond"></span>
  </div>

  <div class="message">
    <p>
      Twenty-two looks <strong>beautiful</strong> on you.<br>
      Here's to a year filled with adventures, laughter, and everything your heart desires. You deserve the world and then some.
    </p>
  </div>

  <div class="cake-wrap">
    <div class="cake">
      <div class="candle-glow"></div>
      🎂
    </div>
  </div>

  <button class="wish-btn" id="wishBtn">Make a Wish</button>

  <span class="footer-note">March 14, 2026</span>
</div>

<!-- Music toggle -->
<button class="music-toggle" id="musicBtn" title="Toggle music">
  <div class="bars" id="bars">
    <span></span><span></span><span></span><span></span>
  </div>
</button>

<script>
// === STARS ===
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
    star.style.setProperty('--max-opacity', (0.4 + Math.random() * 0.6));
    star.style.animationDelay = Math.random() * 3 + 's';
    if (Math.random() > 0.7) {
      star.style.width = '3px';
      star.style.height = '3px';
    }
    container.appendChild(star);
  }
})();

// === FLOATING PARTICLES ===
(function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['#d4a853', '#f0d48a', '#e8c4b8', '#8a9a7b', '#6b2d3e'];
  setInterval(() => {
    if (document.hidden) return;
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '-10px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.setProperty('--dur', (6 + Math.random() * 8) + 's');
    container.appendChild(p);
    setTimeout(() => p.remove(), 14000);
  }, 500);
})();

// === CONFETTI ===
const confettiCanvas = document.getElementById('confetti');
const ctx = confettiCanvas.getContext('2d');
let confettiPieces = [];
let confettiActive = false;

function resizeCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function launchConfetti() {
  confettiActive = true;
  const colors = ['#d4a853', '#f0d48a', '#e8c4b8', '#6b2d3e', '#8a9a7b', '#fff', '#ff6b8a', '#ffd700'];
  for (let i = 0; i < 150; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -10 - Math.random() * 200,
      w: 4 + Math.random() * 6,
      h: 8 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 6,
      vy: 2 + Math.random() * 4,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10,
      opacity: 1
    });
  }
  animateConfetti();
}

function animateConfetti() {
  if (!confettiActive) return;
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiPieces.forEach((p, i) => {
    p.x += p.vx;
    p.vy += 0.05;
    p.y += p.vy;
    p.rotation += p.rotSpeed;
    if (p.y > confettiCanvas.height) p.opacity -= 0.02;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rotation * Math.PI) / 180);
    ctx.globalAlpha = Math.max(0, p.opacity);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  confettiPieces = confettiPieces.filter(p => p.opacity > 0);
  if (confettiPieces.length > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiActive = false;
    ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

// === WISH BUTTON ===
document.getElementById('wishBtn').addEventListener('click', function () {
  launchConfetti();
  this.textContent = '🌟 Wish Sent! 🌟';
  this.style.borderColor = 'var(--gold-light)';
  this.style.color = 'var(--gold-light)';
  setTimeout(() => {
    this.textContent = 'Make a Wish';
    this.style.borderColor = '';
    this.style.color = '';
  }, 3000);
});

// === BIRTHDAY MUSIC (Web Audio API - gentle melody) ===
let audioCtx, isPlaying = false;

function createMelody() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Happy Birthday melody - simplified
  const notes = [
    262, 262, 294, 262, 349, 330, 0,
    262, 262, 294, 262, 392, 349, 0,
    262, 262, 523, 440, 349, 330, 294, 0,
    466, 466, 440, 349, 392, 349
  ];
  const durations = [
    0.3, 0.3, 0.6, 0.6, 0.6, 1.0, 0.3,
    0.3, 0.3, 0.6, 0.6, 0.6, 1.0, 0.3,
    0.3, 0.3, 0.6, 0.6, 0.6, 0.6, 1.0, 0.3,
    0.3, 0.3, 0.6, 0.6, 0.6, 1.2
  ];

  let time = audioCtx.currentTime + 0.1;
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.12;
  masterGain.connect(audioCtx.destination);

  notes.forEach((freq, i) => {
    if (freq === 0) { time += durations[i]; return; }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(0.3, time + 0.05);
    gain.gain.linearRampToValueAtTime(0, time + durations[i] * 0.9);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + durations[i]);
    time += durations[i];
  });

  setTimeout(() => {
    isPlaying = false;
    document.getElementById('bars').classList.remove('playing');
  }, time * 1000);
}

document.getElementById('musicBtn').addEventListener('click', function () {
  if (!isPlaying) {
    createMelody();
    isPlaying = true;
    document.getElementById('bars').classList.add('playing');
  }
});

// Auto-launch a small confetti burst on load
window.addEventListener('load', () => {
  setTimeout(launchConfetti, 2000);
});
</script>
</body>
</html>
